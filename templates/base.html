<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> {% block title %} {% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="container">
        <div>
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="/">MyDuka</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="/">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/products">Products</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/sales">Sales</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/stock">Stock</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/dashboard">Dashboard</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/login">Login</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/register">Register</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>

        {% block content %}

        {% endblock %}
        <div class="bg-dark py-4 mt-5 text-white">
            <div class="container text-center text-md-start">
                <div class="row">
                    <div class="col-md-6">
                        <h5>MyDuka</h5>
                        <p>Shop with us.</p>
                    </div>
                    <div class="col-md-3">
                        <h6>Links</h6>
                        <ul class="list-unstyled">
                            <li><a class="text-decoration-none text-white" href="">Home</a></li>
                            <li><a class="text-decoration-none text-white" href="">About</a></li>
                            <li><a class="text-decoration-none text-white" href="">Contact</a></li>
                        </ul>
                    </div>
                    <div class="col-md-3">
                        <ul class="list-unstyled">
                            <h6>Social Media</h6>
                            <a href="https://www.facebook.com/"><i class="fa-brands fa-facebook fa-sm"
                                    style="color: rgb(246, 245, 245);"></i></a>
                            <a href="https://www.instagram.com/"><i class="fa-brands fa-instagram fa-sm"
                                    style="color: rgb(246, 245, 245);"></i></a>
                            <a href="https://x.com/"><i class="fa-brands fa-twitter fa-sm"
                                    style="color: rgb(246, 245, 245);"></i></a>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <p>© 2026 MyDuka. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
