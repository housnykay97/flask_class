{% extends 'base.html' %}
{% block title %} Login {% endblock %}
{% block content %}
<div class="container" style="margin-top: 70px;">
    <h3 style="font-weight: 800;"><span class="text-secondary">My</span><span
            style="color: rgb(65, 63, 63);">Duka</span>
    </h3>
    <h6 style="margin-top: 40px; font-size: xx-large;">Welcome back!</h6>
    <p>Log in to your account</p>
    <div style="margin-top: 30px;">
        <form method="post" action="/login">
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Email address</label>
                <input type="email" name="email" required class="form-control w-50" id="exampleInputEmail1"
                    aria-describedby="emailHelp">
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Password</label>
                <input type="password" name="password" required class="form-control w-50" id="exampleInputPassword1">
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
</div>
{% endblock %}
